name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall -q src scripts tests app.py
      - run: python -m pytest tests -q
      - run: python -m src.generate_demo_benchmark --output reports/demo_benchmark
      - run: python scripts/run_phase2_ablations.py --dry-run
      - run: python scripts/run_phase2_ablations.py --mock --difficulty easy --limit 1 --output-dir outputs/ci-smoke
